<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>内容审核通知</title>
    <style>
        /* 基础重置与现代排版 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f3f4f6;
            color: #111827;
            -webkit-font-smoothing: antialiased;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* 主容器 */
        .container {
            width: 100%;
            max-width: 760px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        /* 头部区域 */
        .header {
            padding: 40px 32px 24px;
            text-align: center;
        }

        .icon-doc {
            display: inline-block;
            margin-bottom: 16px;
            padding: 16px;
            background-color: #eff6ff;
            border-radius: 50%;
            color: #2563eb;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #111827;
            letter-spacing: 0.5px;
        }

        /* 内容区 */
        .content {
            padding: 0 32px;
        }

        /* 现代化数字摘要卡片 */
        .summary-card {
            background-color: #eff6ff; /* 悦木蓝浅色底 */
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            margin-bottom: 32px;
        }

        .summary-card p {
            font-size: 14px;
            color: #1e3a8a;
            margin: 0;
        }

        .summary-card .count-number {
            display: block;
            font-size: 40px;
            font-weight: 700;
            color: #2563eb;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            margin: 8px 0;
            line-height: 1;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 16px;
        }

        /* 极简 SaaS 风格表格 */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 32px;
            border: 1px solid #f1f5f9;
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            white-space: nowrap;
        }

        th {
            background-color: #f8fafc;
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
            padding: 14px 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 16px 20px;
            font-size: 14px;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* 柔和的 Tailwind 风格标签 */
        .type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .picture { background-color: #eff6ff; color: #2563eb; } /* 图片：蓝 */
        .post { background-color: #ecfdf5; color: #059669; }    /* 帖子：绿 */

        /* 悬浮操作按钮 */
        .action-section {
            text-align: center;
            margin: 16px 0 40px;
        }

        .action-button {
            display: inline-block;
            background-color: #2563eb;
            color: #ffffff;
            padding: 14px 36px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
        }

        .action-button:hover {
            background-color: #1d4ed8;
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
            transform: translateY(-1px);
        }

        /* 底部 */
        .footer {
            background-color: #fafafa;
            padding: 24px 32px;
            text-align: center;
            border-top: 1px solid #f1f5f9;
        }

        .footer p {
            margin: 4px 0;
            font-size: 13px;
            color: #94a3b8;
        }

        .footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        /* =========================================
           移动端深度适配 (无边距、沉浸式)
           ========================================= */
        @media screen and (max-width: 600px) {
            body {
                padding: 0;
                background-color: #ffffff;
            }

            .container {
                border-radius: 0;
                box-shadow: none;
            }

            .header {
                padding: 32px 20px 20px;
            }

            .content {
                padding: 0 20px;
            }

            .summary-card {
                padding: 20px;
            }

            /* 去掉移动端表格的外边框，让横向滑动更加原生自然 */
            .table-wrapper {
                border: none;
                border-radius: 0;
                margin-left: -20px;
                margin-right: -20px;
                width: calc(100% + 40px);
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="icon-doc">
            <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
        </div>
        <h1>新增内容待审核</h1>
    </div>

    <div class="content">
        <div class="summary-card">
            <p>当前等待审核的新发布内容</p>
            <span class="count-number">:count</span>
            <p>为保证内容合规，请及时跟进处理</p>
        </div>

        <div class="section-title">待审核明细</div>

        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>用户 ID</th>
                    <th>用户邮箱</th>
                    <th>内容 ID</th>
                    <th>内容标题</th>
                    <th>内容类型</th>
                    <th>创建时间</th>
                </tr>
                </thead>
                <tbody>
                :table_content
                </tbody>
            </table>
        </div>

        <div class="action-section">
            <a href="#" class="action-button">立即前往审核</a>
        </div>
    </div>

    <div class="footer">
        <p>此邮件由系统自动发出，请勿直接回复</p>
        <p>© 2026 <a href="https://yuemutuku.com" target="_blank">悦木图库</a>. All rights reserved.</p>
    </div>
</div>
</body>
</html>

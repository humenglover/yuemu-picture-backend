server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
  tomcat:
    max-threads: 200
    min-spare-threads: 10
    max-connections: 1000
    accept-count: 100
    connection-timeout: 20000
spring:
  servlet:
    multipart:
      max-file-size: 10MB
    # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yuemu_picture?characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD}
  # Redis 配置
  redis:
    database: 10
    host: 127.0.0.1
    port: 6379
    #    password: ${REDIS_PASSWORD:}
    lettuce:
      pool:
        max-active: 100
        max-idle: 8
        min-idle: 2
        max-wait: 1000
      shutdown-timeout: 100ms
  meilisearch:
    host: ${MEILISEARCH_HOST:http://localhost:7700}
    api-key: ${MEILISEARCH_API_KEY}
    sync:
      batch:
        size: 1000
      picture:
        enable: true
      user:
        enable: true
      post:
        enable: true
      space:
        enable: true
  # Session 配置
  session:
    store-type: redis
    # session 30 天后过期
    timeout: 2592000

  #  邮箱
  mail:
    from: ${MAIL_FROM}
    password: ${MAIL_PASSWORD}
    host: smtp.qq.com
    port: 465
    admin: ${MAIL_ADMIN}

  data:
    redis:
      timeout: 5000

mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: false
    # 仅在开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    enable-sql-runner: true
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）

# 接口文档配置
knife4j:
  enable: true
  production: false
  #  basic:
  #    enable: true
  #    username: admin
  #    password: admin
  openapi:
    title: 悦木图片管理系统 - API接口文档
    description: 基于SpringBoot + Vue3开发的图片管理系统，提供图片上传、管理、分享、搜索等完整功能的RESTful API接口文档
    version: v1.0.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.lumenglover.yuemupicturebackend.controller

## 对象存储配置（需要从腾讯云获取）
cos:
  client:
    enable: true
    duration: 1800
    host: ${COS_HOST}
    secretId: ${COS_SECRET_ID}
    secretKey: ${COS_SECRET_KEY}
    region: ${COS_REGION}
    bucket: ${COS_BUCKET}
    admin-email: ${COS_ADMIN_EMAIL}  # 管理员邮箱
    audit-biz-type: ""  # 图片审核策略类型，可选配置
    text-audit-biz-type: ""  # 文本审核策略类型，可选配置
    custom-domain: ${COS_CUSTOM_DOMAIN}  # 自定义域名


# 阿里云 AI 配置
aliYunAi:
  apiKey: ${ALIYUN_AI_API_KEY}

# 微信配置
wx:
  mp:
    token: ${WX_MP_TOKEN}

# RAG基础配置
rag:
  python-service:
    base-url: "${RAG_PYTHON_SERVICE_BASE_URL:http://127.0.0.1:8001}"

# Pexels 图片抓取配置
pexels:
  # API密钥
  api-key: ${PEXELS_API_KEY}
  # API 基础 URL
  base-url: https://api.pexels.com/v1
  # Pexels 网站 URL（用于版权归属）
  website-url: https://www.pexels.com
  # 功能开关
  enabled: true
  # 定时任务 cron 表达式（每天凌晨2点执行）
  cron: "0 0 2 * * ?"
  # 每天成功上传的目标数量
  daily-target: 5
  # 每个分类抓取的数量
  per-category: 5
  # 随机选择的分类数量
  random-categories: 1
  # 批量处理数量
  batch-size: 20
  # 机器人配置
  bot:
    username: "图库助手"
    user-account: "pexels_bot"
    password: "${PEXELS_BOT_PASSWORD}"
    user-role: "bot"
    user-profile: "我是图库助手，为您精选来自 Pexels 的优质图片素材。"
    avatar-url: ""

# Qdrant 向量数据库配置
qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6334}
  collection-name: yuemu_picture

# 阿里云大模型配置
ai:
  dashscope:
    api-key: ${aliYunAi.apiKey}
    embedding:
      url: "https://dashscope.aliyuncs.com/api/v1/services/embeddings/multimodal-embedding/multimodal-embedding"
      model: "tongyi-embedding-vision-flash"
      dimension: 768
